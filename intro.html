<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Byteforgenet</title>

  <style>
    /* ================= RESET & THEME MATCH ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      /* Match style.css auth-bg background */
      background: linear-gradient(-45deg, #080808, #101018, #0a0e1a, #080808);
      background-size: 300% 300%;
      animation: bgFlowSlow 30s ease infinite, pageFadeIn 0.5s ease-out forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e5e5e5;
      position: relative;
    }

    /* Faint Orbs matching web theme */
    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      pointer-events: none;
      animation: floatOrb 25s infinite alternate ease-in-out;
      opacity: 0.2;
    }

    body::before {
      background: rgba(96, 165, 250, 0.08);
      top: 5%;
      left: 5%;
    }

    body::after {
      background: rgba(167, 139, 250, 0.08);
      /* faint purple */
      bottom: 5%;
      right: 10%;
      animation-delay: -10s;
    }

    /* Base keyframes matched to theme */
    @keyframes bgFlowSlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes floatOrb {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(15px, 15px) scale(1.05);
      }
    }

    @keyframes pageFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Main Container relative to absolute orbs */
    .intro-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* ================= THE NEW ELITE LOGO ================= */
    /* A complex CSS 3D ring sphere animation */
    .logo-sphere {
      width: 150px;
      height: 150px;
      position: relative;
      perspective: 1000px;
      opacity: 0;
      transform: scale(0.8) translateY(20px);
      animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      transform-style: preserve-3d;
    }

    .ring-1 {
      border-left: 2px solid #4f8cff;
      border-right: 2px solid rgba(96, 165, 250, 0.2);
      animation: spinRingX 6s linear infinite;
      box-shadow: 0 0 20px rgba(79, 140, 255, 0.3) inset;
    }

    .ring-2 {
      border-top: 2px solid #a78bfa;
      border-bottom: 2px solid rgba(167, 139, 250, 0.2);
      animation: spinRingY 8s linear infinite reverse;
    }

    .ring-3 {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 2px solid #fff;
      animation: spinRingZ 10s linear infinite;
      width: 120px;
      height: 120px;
      top: 15px;
      left: 15px;
    }

    /* Center core that pulses */
    .core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, #4f8cff 0%, #101018 70%);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(79, 140, 255, 0.6), 0 0 60px rgba(167, 139, 250, 0.4);
      animation: pulseCore 3s ease-in-out infinite alternate;
    }

    @keyframes spinRingX {
      0% {
        transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }

      100% {
        transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg);
      }
    }

    @keyframes spinRingY {
      0% {
        transform: rotateX(0deg) rotateY(0deg);
      }

      100% {
        transform: rotateX(180deg) rotateY(360deg);
      }
    }

    @keyframes spinRingZ {
      0% {
        transform: rotateZ(0deg) rotateX(45deg);
      }

      100% {
        transform: rotateZ(360deg) rotateX(45deg);
      }
    }

    @keyframes pulseCore {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 1;
      }
    }

    @keyframes logoReveal {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ================= TYPEWRITER TEXT ================= */
    .text-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }

    .typewriter-text {
      font-size: clamp(32px, 6vw, 54px);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
      display: inline-block;
      min-height: 1.2em;
      /* Ensure layout doesn't jump */
    }

    .caret {
      display: inline-block;
      width: 3px;
      height: 0.9em;
      background-color: #4f8cff;
      margin-left: 8px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    .caret.inactive {
      display: none;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* Fade out transition overlay */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #080808;
      /* Matches page background to fade beautifully into login */
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 1.2s ease;
    }

    .fade-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>

<body>

  <div class="intro-container">

    <!-- The 3D CSS Sphere Logo -->
    <div class="logo-sphere">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="core"></div>
    </div>

    <!-- The Typing Text -->
    <div class="text-box">
      <div>
        <span id="typewriter" class="typewriter-text"></span><span class="caret" id="caret"></span>
      </div>
    </div>

  </div>

  <div class="fade-overlay" id="fadeOverlay"></div>

  <script>
    const fullText = "byteforgenet";
    const typewriterElement = document.getElementById("typewriter");
    const caret = document.getElementById("caret");
    const fadeOverlay = document.getElementById("fadeOverlay");

    const typingSpeed = 100;
    let i = 0;

    // Start typing slightly after logo fully enters
    setTimeout(() => {
      type();
    }, 1200);

    function type() {
      if (i < fullText.length) {
        typewriterElement.textContent += fullText.charAt(i);
        i++;

        // Random variance to speed for realism
        const randomDelay = typingSpeed + (Math.random() * 60 - 30);
        setTimeout(type, randomDelay);
      } else {
        // Typing done, wait then transition
        setTimeout(() => {
          caret.classList.add('inactive'); // remove caret when done
          triggerExitSequence();
        }, 1800);
      }
    }

    function triggerExitSequence() {
      fadeOverlay.classList.add("active");

      // Navigate to login after the long, smooth fade-out (simulating the time it takes)
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    }
  </script>
</body>

</html>
