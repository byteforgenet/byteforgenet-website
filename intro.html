<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Byteforgenet</title>

<style>

/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: radial-gradient(
      circle at center,
      rgba(96,165,250,0.15) 0%,
      #0a0a0f 60%
  ),
  #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
}

/* ================= MAIN TEXT ================= */
.logo {
  font-size: clamp(38px, 8vw, 110px);
  font-weight: 600;
  letter-spacing: 0.2em;
  color: #f5f5f5;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards;
}

/* Letter reveal */
.logo span {
  display: inline-block;
  opacity: 0;
  transform: translateY(40px);
  animation: letterRise 0.8s ease forwards;
}

@keyframes letterRise {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Soft glow pulse */
@keyframes glowPulse {
  0% { text-shadow: 0 0 10px rgba(96,165,250,0.2); }
  50% { text-shadow: 0 0 30px rgba(96,165,250,0.6); }
  100% { text-shadow: 0 0 10px rgba(96,165,250,0.2); }
}

.logo.finished {
  animation: glowPulse 3s ease-in-out infinite;
}

/* Fade in container */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* Fade out transition */
body.fade-out {
  animation: fadeOut 1s ease forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(1.05);
  }
}

</style>
</head>

<body>

<div class="logo" id="logo"></div>

<script>
const text = "BYTEFORGENET";
const logo = document.getElementById("logo");

text.split("").forEach((char, i) => {
  const span = document.createElement("span");
  span.textContent = char;
  span.style.animationDelay = `${i * 0.07}s`;
  logo.appendChild(span);
});

setTimeout(() => {
  logo.classList.add("finished");
}, text.length * 70 + 500);

setTimeout(() => {
  document.body.classList.add("fade-out");
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1000);
}, 3500);
</script>

</body>
</html>
