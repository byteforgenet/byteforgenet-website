<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Projects | Byteforgenet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css?v=1772010732776" />
  <script type="module" src="layout.js?v=3"></script>
  <style>
    /* ========== KANBAN BOARD ========== */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 24px;
    }

    .kanban-col {
      background: rgba(14, 14, 20, 0.9);
      border: 1px solid rgba(96, 165, 250, 0.12);
      border-radius: 18px;
      padding: 20px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }

    .kanban-col.drag-over {
      border-color: rgba(79, 140, 255, 0.55);
      background: rgba(79, 140, 255, 0.04);
    }

    .kanban-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .kanban-col-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .col-todo .kanban-col-title {
      color: #93c5fd;
    }

    .col-inprog .kanban-col-title {
      color: #fbbf24;
    }

    .col-done .kanban-col-title {
      color: #86efac;
    }

    .col-count {
      font-size: 12px;
      padding: 2px 9px;
      border-radius: 999px;
      font-weight: 600;
    }

    .col-todo .col-count {
      background: rgba(79, 140, 255, 0.15);
      color: #93c5fd;
    }

    .col-inprog .col-count {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .col-done .col-count {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
    }

    .kanban-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 60px;
    }

    .kanban-card {
      background: rgba(24, 24, 32, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 13px;
      padding: 14px 16px;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      transition: box-shadow 0.2s, transform 0.2s;
      user-select: none;
    }

    .kanban-card:hover {
      border-color: rgba(79, 140, 255, 0.35);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      transform: translateY(-2px);
    }

    .kanban-card.dragging {
      opacity: 0.45;
      cursor: grabbing;
      transform: rotate(1.5deg) scale(1.03);
    }

    .kanban-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kanban-card-text {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      padding-right: 8px;
      line-height: 1.4;
    }

    .kanban-delete,
    .kanban-edit {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 5px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .kanban-delete:hover {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }

    .kanban-edit:hover {
      background: rgba(96, 165, 250, 0.15);
      color: #93c5fd;
    }

    .prio-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      padding: 2px 9px;
      border-radius: 999px;
    }

    .prio-High {
      background: rgba(96, 165, 250, 0.2);
      color: #93c5fd;
    }

    .prio-Med {
      background: rgba(96, 165, 250, 0.1);
      color: #6b92c8;
    }

    .prio-Low {
      background: rgba(255, 255, 255, 0.05);
      color: #6b7280;
    }

    .kanban-add-btn {
      margin-top: 14px;
      padding: 9px;
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      background: none;
      color: #555;
      width: 100%;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .kanban-add-btn:hover {
      border-color: rgba(79, 140, 255, 0.4);
      color: #4f8cff;
      background: rgba(79, 140, 255, 0.05);
    }

    /* ========= MODAL ========= */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      backdrop-filter: blur(4px);
    }

    .modal.hidden {
      display: none;
    }

    .modal-card {
      background: #131318;
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 20px;
      padding: 28px 32px;
      width: 380px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
    }

    .modal-card h3 {
      margin: 0 0 18px;
      font-size: 18px;
    }

    .prio-btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .prio-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .prio-btn.active {
      border-color: #4f8cff;
      color: #4f8cff;
      background: rgba(79, 140, 255, 0.1);
    }

    /* ========== TIMELINE / GANTT VIEW ========== */
    .view-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 4px;
      width: fit-content;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      color: #aaa;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .view-toggle button.active {
      background: var(--primary-color);
      color: white;
    }

    .timeline-container {
      display: none;
      /* Hidden by default */
      background: rgba(14, 14, 20, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      margin-top: 24px;
      overflow-x: auto;
      padding: 20px;
      position: relative;
    }

    .timeline-grid {
      display: grid;
      grid-template-columns: 200px repeat(30, 40px);
      /* 30 days */
      gap: 1px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .timeline-header-cell {
      background: rgba(20, 20, 26, 0.9);
      padding: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .timeline-header-cell:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 10;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .timeline-row {
      display: contents;
    }

    .timeline-cell {
      background: rgba(14, 14, 20, 0.9);
      height: 50px;
      position: relative;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .timeline-cell.task-name {
      padding: 10px;
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: sticky;
      left: 0;
      z-index: 5;
      background: rgba(20, 20, 26, 0.95);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
    }

    .timeline-bar {
      position: absolute;
      top: 10px;
      height: 30px;
      background: var(--primary-color);
      border-radius: 6px;
      z-index: 2;
      box-shadow: 0 4px 12px rgba(79, 140, 255, 0.2);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 11px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      cursor: grab;
      transition: filter 0.2s;
    }

    .timeline-bar:hover {
      filter: brightness(1.2);
    }

    .timeline-bar.dependent {
      background: #fbbf24;
    }

    /* Dependency lines */
    .dependency-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .dep-line {
      stroke: #f43f5e;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 4;
    }

    @media (max-width: 900px) {
      .kanban-board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- CURSOR GLOW -->
  <div class="cursor-glow" id="cursorGlow"></div>
  <script>
    const cursorGlow = document.getElementById("cursorGlow");
    document.addEventListener("mousemove", (e) => {
      requestAnimationFrame(() => {
        cursorGlow.style.transform = `translate(${e.clientX - 400}px, ${e.clientY - 400}px)`;
      });
    });
  </script>


  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="app-logo" style="text-decoration:none; color:inherit;">Byteforgenet</a>
    </div>
    <div class="topbar-right">
      <!-- Theme toggle -->
      <button id="themeToggle" title="Toggle theme"
        style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px 8px;border-radius:8px;">🌙</button>

      <div class="notif-wrap" id="notifBtn">
        <div class="bell"></div>
        <span class="notif-count" id="notifCount">0</span>
        <div class="notif-menu hidden" id="notifMenu">
          <h4>Notifications</h4>
          <div id="notifList"></div>
        </div>
      </div>

      <div class="profile" id="profileBtn">
        <div class="user-text">
          <span class="username" id="topbarName">—</span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
        <div class="avatar" id="topbarAvatar"><span class="online-dot"></span></div>
        <div class="profile-menu hidden" id="profileMenu">
          <div class="menu-section">
            <button class="menu-item" onclick="location.href='profile.html'">Profile</button>
            <button class="menu-item" onclick="location.href='settings.html'">Settings</button>
          </div>
          <div class="menu-divider"></div>
          <div class="menu-section">
            <button class="menu-item danger" onclick="logout()">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <nav>
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="project.html" class="nav-item active">Projects</a>
        <a href="notes.html" class="nav-item">Notes</a>
        <a href="teams.html" class="nav-item">Teams</a>
        <a href="profile.html" class="nav-item">Profile</a>
        <a href="settings.html" class="nav-item">Settings</a>
      </nav>
    </aside>

    <main class="main-content">

      <!-- Project header -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">
        <div>
          <h2 style="margin:0 0 4px;">Byteforgenet Web</h2>
          <small style="color:#aaa;">Landing • Auth • Dashboard &nbsp;·&nbsp;
            <span id="taskCountBadge" style="color:#4f8cff;">0 tasks</span>
          </small>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <span class="perm" id="permBadge">OWNER</span>
          <button class="ghost small" id="settingsBtn" style="font-size:13px;">Settings</button>
        </div>
      </div>

      <!-- Project stats -->
      <div style="display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;align-items:center;">
        <div class="stat-card" style="flex:1;min-width:120px;">
          <h3>Status</h3><strong style="color:#86efac;">Active</strong>
        </div>
        <div class="stat-card" style="flex:1;min-width:120px;">
          <h3>Type</h3><strong>Web</strong>
        </div>
        <div class="stat-card" style="flex:1;min-width:120px;">
          <h3>Updated</h3><strong>Today</strong>
        </div>
        <div class="stat-card" style="flex:1;min-width:120px;">
          <h3>Done</h3><strong id="doneCount">0</strong>
        </div>

        <!-- VIEW TOGGLE -->
        <div class="view-toggle">
          <button id="btnKanban" class="active" onclick="switchView('kanban')">Kanban</button>
          <button id="btnTimeline" onclick="switchView('timeline')">Timeline</button>
        </div>
      </div>

      <!-- Kanban Board -->
      <div class="kanban-board">

        <!-- TO DO -->
        <div class="kanban-col col-todo" data-col="todo" id="col-todo" ondragover="onDragOver(event)"
          ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
          <div class="kanban-col-header">
            <span class="kanban-col-title">To Do</span>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="kanban-cards" id="cards-todo"></div>
          <button class="kanban-add-btn" onclick="openAddModal('todo')">+ Add task</button>
        </div>

        <!-- IN PROGRESS -->
        <div class="kanban-col col-inprog" data-col="inprog" id="col-inprog" ondragover="onDragOver(event)"
          ondrop="onDrop(event,'inprog')" ondragleave="onDragLeave(event)">
          <div class="kanban-col-header">
            <span class="kanban-col-title">In Progress</span>
            <span class="col-count" id="count-inprog">0</span>
          </div>
          <div class="kanban-cards" id="cards-inprog"></div>
        </div>

        <!-- DONE -->
        <div class="kanban-col col-done" data-col="done" id="col-done" ondragover="onDragOver(event)"
          ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
          <div class="kanban-col-header">
            <span class="kanban-col-title">Done</span>
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="kanban-cards" id="cards-done"></div>
        </div>

      </div>

      <!-- TIMELINE BOARD -->
      <div class="timeline-container" id="timelineBoard">
        <svg class="dependency-svg" id="dependencySvg"></svg>
        <div class="timeline-grid" id="timelineGrid">
          <!-- Will be populated by JS -->
        </div>
      </div>

    </main>
  </div>

  <!-- ADD TASK MODAL -->
  <div class="modal hidden" id="taskModal">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h3>New Task</h3>
      <input id="taskInput" placeholder="Task name…" style="margin-bottom:14px;" />
      <input id="taskDescInput" placeholder="Description (optional)…" style="margin-bottom:14px;" />
      <input id="taskAssigneeInput" placeholder="Assignee Email (optional)…" style="margin-bottom:14px;" />

      <label
        style="font-size:12px;color:#9aa3b2;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px;">Deadline
        (Optional)</label>
      <input type="date" id="taskDeadlineInput"
        style="margin-bottom:14px; width:100%; box-sizing:border-box; padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-family:inherit; font-size:14px;" />

      <label
        style="font-size:12px;color:#9aa3b2;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px;">Priority</label>
      <div class="prio-btn-row" id="addPrioRow">
        <button class="prio-btn" data-prio="Low">Low</button>
        <button class="prio-btn active" data-prio="Med">Med</button>
        <button class="prio-btn" data-prio="High">High</button>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:6px;">
        <button class="ghost" onclick="closeModal()">Cancel</button>
        <button class="primary small" onclick="addTask()">Add Task</button>
      </div>
    </div>
  </div>

  <!-- EDIT TASK MODAL -->
  <div class="modal hidden" id="editTaskModal">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h3>Edit Task</h3>
      <input id="editTaskInput" placeholder="Task name…" style="margin-bottom:14px;" />
      <input id="editTaskDescInput" placeholder="Description (optional)…" style="margin-bottom:14px;" />
      <input id="editTaskAssigneeInput" placeholder="Assignee Email (optional)…" style="margin-bottom:14px;" />

      <label
        style="font-size:12px;color:#9aa3b2;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px;">Deadline
        (Optional)</label>
      <input type="date" id="editTaskDeadlineInput"
        style="margin-bottom:14px; width:100%; box-sizing:border-box; padding:10px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-family:inherit; font-size:14px;" />

      <label
        style="font-size:12px;color:#9aa3b2;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px;">Priority</label>
      <div class="prio-btn-row" id="editPrioRow">
        <button class="prio-btn" data-prio="Low">Low</button>
        <button class="prio-btn" data-prio="Med">Med</button>
        <button class="prio-btn" data-prio="High">High</button>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:6px;">
        <button class="ghost" onclick="closeModal()">Cancel</button>
        <button class="primary small" onclick="saveEditTask()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- SHORTCUT HELP OVERLAY -->
  <div class="modal hidden" id="shortcutModal">
    <div class="modal-card" onclick="event.stopPropagation()" style="width:440px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <h3 style="margin:0;">Keyboard Shortcuts</h3>
        <button onclick="document.getElementById('shortcutModal').classList.add('hidden')"
          style="background:none;border:none;color:#777;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div id="shortcutList"></div>
    </div>
  </div>

  <!-- =================== SCRIPTS =================== -->
  <script type="module">
    import { auth } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { toast } from "./shared.js";

    /* ===== AUTH ===== */
    onAuthStateChanged(auth, user => {
      if (!user) return;
      const name = user.displayName || user.email?.split("@")[0] || "User";
      document.getElementById("topbarName").textContent = name;
      const av = document.getElementById("topbarAvatar");
      if (user.photoURL) {
        av.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"/><span class="online-dot"></span>`;
      } else {
        av.innerHTML = `${name.charAt(0).toUpperCase()}<span class="online-dot"></span>`;
      }
      const role = localStorage.getItem("bf_role") || "member";
      const badge = document.getElementById("roleBadge");
      badge.textContent = role.toUpperCase();
      badge.classList.add(role === "admin" ? "role-admin" : "role-member");
    });
    window.logout = () => {
      import("https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js").then(({ signOut }) => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
      });
    };

    /* ===== DROPDOWNS ===== */
    const profileBtn = document.getElementById("profileBtn");
    const profileMenu = document.getElementById("profileMenu");
    const notifBtn = document.getElementById("notifBtn");
    const notifMenu = document.getElementById("notifMenu");
    profileBtn.onclick = e => { e.stopPropagation(); profileMenu.classList.toggle("hidden"); notifMenu.classList.add("hidden"); };
    notifBtn.onclick = e => { e.stopPropagation(); notifMenu.classList.toggle("hidden"); profileMenu.classList.add("hidden"); };
    document.onclick = () => { profileMenu.classList.add("hidden"); notifMenu.classList.add("hidden"); };

    const notifs = JSON.parse(localStorage.getItem("bf_notifications") || "[]");
    document.getElementById("notifCount").textContent = notifs.length;
    document.getElementById("notifList").innerHTML = notifs.length
      ? notifs.map(n => `<div class="notif-item">${n.text}</div>`).join("")
      : `<div style="color:#777;font-size:13px;padding:6px 0;">No notifications</div>`;

    /* ===== PERMISSIONS ===== */
    const PERM_KEY = "bf_project_perms";
    if (!localStorage.getItem(PERM_KEY)) localStorage.setItem(PERM_KEY, JSON.stringify({ bf_web: { role: "owner" } }));
    const myPerm = JSON.parse(localStorage.getItem(PERM_KEY))["bf_web"]?.role || "viewer";
    document.getElementById("permBadge").textContent = myPerm.toUpperCase();


    /* ===== KANBAN DATA ===== */
    const BOARD_KEY = "bf_kanban";

    function loadBoard() {
      return JSON.parse(localStorage.getItem(BOARD_KEY) || '{"todo":[],"inprog":[],"done":[]}');
    }
    function saveBoard(board) {
      localStorage.setItem(BOARD_KEY, JSON.stringify(board));
      // Also sync flat task list for dashboard
      const allTasks = [...board.todo, ...board.inprog, ...board.done.map(t => ({ ...t, done: true }))];
      localStorage.setItem("bf_tasks", JSON.stringify(allTasks));
    }

    function renderBoard() {
      const board = loadBoard();
      let total = 0;
      ["todo", "inprog", "done"].forEach(col => {
        const container = document.getElementById(`cards-${col}`);
        const items = board[col] || [];
        total += items.length;
        container.innerHTML = "";
        document.getElementById(`count-${col}`).textContent = items.length;

        items.forEach(task => {
          const card = document.createElement("div");
          card.className = "kanban-card";
          card.draggable = true;
          card.dataset.id = task.id;
          card.dataset.col = col;

          card.innerHTML = `
        <div class="kanban-card-top">
          <span class="kanban-card-text">${task.text}</span>
          <div style="display:flex; gap:4px; align-items:center;">
            <button class="kanban-edit" onclick="openEditModal(${task.id},'${col}');event.stopPropagation();" title="Edit">✎</button>
            <button class="kanban-delete" onclick="deleteTask(${task.id},'${col}');event.stopPropagation();" title="Delete">✕</button>
          </div>
        </div>
        ${task.description ? `<p style="font-size:12px;color:#aaa;margin:6px 0 8px;">${task.description}</p>` : ""}
        ${task.deadline ? `<div style="font-size:11px;color:#eab308;margin:0 0 8px;display:flex;align-items:center;gap:4px;">⏱ ${task.deadline}</div>` : ""}
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
          ${task.priority ? `<span class="prio-tag prio-${task.priority}">${task.priority}</span>` : "<span></span>"}
          ${task.assigneeEmail ? `<span style="font-size:11px;color:#fff;background:rgba(79, 140, 255, 0.2);padding:2px 6px;border-radius:4px;border:1px solid rgba(79,140,255,0.4);">👤 ${task.text.match(/\(Assigned to: ([^)]+)\)/)?.[1] || task.assigneeEmail.split('@')[0]}</span>` : ""}
        </div>
      `;

          card.addEventListener("dragstart", onDragStart);
          card.addEventListener("dragend", onDragEnd);
          container.appendChild(card);
        });
      });

      const doneCnt = (board.done || []).length;
      document.getElementById("doneCount").textContent = doneCnt;
      document.getElementById("taskCountBadge").textContent = `${total} task${total !== 1 ? "s" : ""}`;
    }

    /* ===== VIEW TOGGLE & TIMELINE RENDERER ===== */
    let currentView = 'kanban';

    window.switchView = function (view) {
      currentView = view;
      document.getElementById('btnKanban').classList.toggle('active', view === 'kanban');
      document.getElementById('btnTimeline').classList.toggle('active', view === 'timeline');

      const kanbanBoard = document.querySelector('.kanban-board');
      const timelineBoard = document.getElementById('timelineBoard');

      if (view === 'kanban') {
        kanbanBoard.style.display = 'grid';
        timelineBoard.style.display = 'none';
      } else {
        kanbanBoard.style.display = 'none';
        timelineBoard.style.display = 'block';
        renderTimeline();
      }
    };

    function renderTimeline() {
      const board = loadBoard();
      const allTasks = [...board.todo, ...board.inprog, ...board.done];
      const grid = document.getElementById('timelineGrid');

      // Let's create a 30 day window starting from 5 days ago
      const startDate = new Date();
      startDate.setDate(startDate.getDate() - 5);
      startDate.setHours(0, 0, 0, 0);

      let html = `
            <div class="timeline-header-cell">Task Name</div>
        `;

      // Generate Date Headers
      for (let i = 0; i < 30; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        html += `<div class="timeline-header-cell">${d.getDate()}/${d.getMonth() + 1}</div>`;
      }

      grid.innerHTML = html;

      // Render Tasks
      allTasks.forEach((task, index) => {
        const row = document.createElement('div');
        row.className = 'timeline-row';

        // Name cell
        let rowHtml = `<div class="timeline-cell task-name" title="${task.text}">${task.text}</div>`;

        // Calculate pixel positions for the bar
        let taskStart = new Date();
        let taskEnd = new Date();
        let durationDays = 3; // Default 3 days if no deadline

        if (task.deadline) {
          taskEnd = new Date(task.deadline);
          // Estimate a start date (e.g. 3 days before deadline)
          taskStart = new Date(taskEnd);
          taskStart.setDate(taskStart.getDate() - durationDays);
        }

        // Generate grid cells
        for (let i = 0; i < 30; i++) {
          const cellDate = new Date(startDate);
          cellDate.setDate(cellDate.getDate() + i);

          let isStartDay = (cellDate.getDate() === taskStart.getDate() && cellDate.getMonth() === taskStart.getMonth());

          rowHtml += `<div class="timeline-cell">`;

          // Draw the bar on the starting day cell
          if (isStartDay) {
            const width = durationDays * 40; // 40px per day column
            const startOffset = 0;
            rowHtml += `<div class="timeline-bar ${task.priority === 'High' ? 'dependent' : ''}" style="width: ${width}px; left: ${startOffset}px">${task.text}</div>`;
          }

          rowHtml += `</div>`;
        }

        row.innerHTML = rowHtml;
        grid.appendChild(row);
      });

      // Draw Dependency Lines (mocking dependencies for high prio tasks)
      drawDependencies(allTasks);
    }

    function drawDependencies(tasks) {
      const svg = document.getElementById('dependencySvg');
      svg.innerHTML = '';

      // A simple visual flourish: connect Med tasks to High priority tasks
      const highTasks = Array.from(document.querySelectorAll('.timeline-bar.dependent'));
      const medTasks = Array.from(document.querySelectorAll('.timeline-bar:not(.dependent)'));

      if (highTasks.length > 0 && medTasks.length > 0) {
        // Draw a line connecting the first med task to the first high task
        const startEl = medTasks[0];
        const endEl = highTasks[0];

        const startRect = startEl.getBoundingClientRect();
        const endRect = endEl.getBoundingClientRect();
        const containerRect = svg.getBoundingClientRect();

        // Calculate relative coordinates
        const startX = (startRect.left - containerRect.left) + startRect.width;
        const startY = (startRect.top - containerRect.top) + (startRect.height / 2);

        const endX = (endRect.left - containerRect.left);
        const endY = (endRect.top - containerRect.top) + (endRect.height / 2);

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        // Create a curved spline
        const d = `M ${startX} ${startY} C ${startX + 30} ${startY}, ${endX - 30} ${endY}, ${endX} ${endY}`;
        path.setAttribute('d', d);
        path.setAttribute('class', 'dep-line');

        svg.appendChild(path);
      }
    }

    /* ===== DRAG & DROP ===== */
    let dragId = null;
    let dragCol = null;

    function onDragStart(e) {
      dragId = parseInt(this.dataset.id);
      dragCol = this.dataset.col;
      this.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }
    function onDragEnd() {
      this.classList.remove("dragging");
      document.querySelectorAll(".kanban-col").forEach(c => c.classList.remove("drag-over"));
    }

    window.onDragOver = function (e) {
      e.preventDefault();
      e.currentTarget.classList.add("drag-over");
    };
    window.onDragLeave = function (e) {
      e.currentTarget.classList.remove("drag-over");
    };
    window.onDrop = function (e, targetCol) {
      e.preventDefault();
      e.currentTarget.classList.remove("drag-over");
      if (!dragId || dragCol === targetCol) return;

      const board = loadBoard();
      const task = board[dragCol].find(t => t.id === dragId);
      if (!task) return;
      board[dragCol] = board[dragCol].filter(t => t.id !== dragId);
      board[targetCol].push(task);
      saveBoard(board);

      const activities = JSON.parse(localStorage.getItem("bf_activity") || "[]");
      const colNames = { todo: "To Do", inprog: "In Progress", done: "Done" };
      activities.unshift(`Moved "${task.text}" → ${colNames[targetCol]}`);
      localStorage.setItem("bf_activity", JSON.stringify(activities.slice(0, 20)));

      renderBoard();
      if (targetCol === "done") toast(`"${task.text}" marked done! 🎉`, "success");
    };

    /* ===== ADD / DELETE ===== */
    let currentCol = "todo";
    let selectedPrio = "Med";

    window.openAddModal = function (col) {
      currentCol = col;
      document.getElementById("taskInput").value = "";
      document.getElementById("taskModal").classList.remove("hidden");
      setTimeout(() => document.getElementById("taskInput").focus(), 80);
    };
    window.closeModal = function () {
      document.getElementById("taskModal").classList.add("hidden");
      document.getElementById("editTaskModal").classList.add("hidden");
      document.getElementById("shortcutModal").classList.add("hidden");
    };
    document.getElementById("taskModal").onclick = closeModal;
    document.getElementById("editTaskModal").onclick = closeModal;

    // Priority buttons for ADD modal
    document.querySelectorAll("#addPrioRow .prio-btn").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        selectedPrio = btn.dataset.prio;
        document.querySelectorAll("#addPrioRow .prio-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // Priority buttons for EDIT modal
    let editSelectedPrio = "Med";
    document.querySelectorAll("#editPrioRow .prio-btn").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        editSelectedPrio = btn.dataset.prio;
        document.querySelectorAll("#editPrioRow .prio-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    async function notifyTaskAssignment(taskData) {
      if (!taskData.assigneeEmail) return;
      try {
        const topbarName = document.getElementById("topbarName").textContent;
        const res = await fetch("http://localhost:3000/api/task-assign", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            taskTitle: taskData.text,
            taskDescription: taskData.description,
            deadline: taskData.deadline,
            assigneeEmail: taskData.assigneeEmail,
            assignerName: topbarName !== "—" ? topbarName : "A Team Member"
          })
        });
        const data = await res.json();
        if (res.ok) {
          toast(`Assignment email sent to ${taskData.assigneeEmail}!`, "success");
        } else {
          toast(`Failed to send email: ${data.error || 'Server error'}`, "error");
        }
      } catch (e) {
        console.error("Failed to notify assignee", e);
        toast("Network error: Could not reach email server.", "error");
      }
    }

    window.addTask = function () {
      const text = document.getElementById("taskInput").value.trim();
      const description = document.getElementById("taskDescInput").value.trim();
      const assigneeEmail = document.getElementById("taskAssigneeInput").value.trim();
      const deadline = document.getElementById("taskDeadlineInput").value;
      if (!text) { toast("Enter a task name!", "error"); return; }

      let finalPrio = selectedPrio;
      if (deadline) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(deadline + "T00:00:00");
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        if (diffDays <= 7) finalPrio = "High";
        else if (diffDays <= 14) finalPrio = "Med";
        else finalPrio = "Low";
      }

      const board = loadBoard();
      const task = { id: Date.now(), text, description, assigneeEmail, deadline, priority: finalPrio };
      board[currentCol].push(task);
      saveBoard(board);

      notifyTaskAssignment(task);

      const activities = JSON.parse(localStorage.getItem("bf_activity") || "[]");
      activities.unshift(`Added task "${text}"`);
      localStorage.setItem("bf_activity", JSON.stringify(activities.slice(0, 20)));

      closeModal();
      renderBoard();
      toast(`Task "${text}" added!`, "success");
    };

    window.deleteTask = function (id, col) {
      const board = loadBoard();
      const task = board[col].find(t => t.id === id);
      board[col] = board[col].filter(t => t.id !== id);
      saveBoard(board);
      renderBoard();
      if (task) toast(`"${task.text}" deleted.`, "info");
    };

    let editingTaskId = null;
    let editingTaskCol = null;

    window.openEditModal = function (id, col) {
      const board = loadBoard();
      const task = board[col].find(t => t.id === id);
      if (!task) return;

      editingTaskId = id;
      editingTaskCol = col;

      document.getElementById("editTaskInput").value = task.text || "";
      document.getElementById("editTaskDescInput").value = task.description || "";
      document.getElementById("editTaskAssigneeInput").value = task.assigneeEmail || "";
      document.getElementById("editTaskDeadlineInput").value = task.deadline || "";

      editSelectedPrio = task.priority || "Med";
      document.querySelectorAll("#editPrioRow .prio-btn").forEach(b => {
        if (b.dataset.prio === editSelectedPrio) b.classList.add("active");
        else b.classList.remove("active");
      });

      document.getElementById("editTaskModal").classList.remove("hidden");
      setTimeout(() => document.getElementById("editTaskInput").focus(), 80);
    };

    window.saveEditTask = function () {
      const text = document.getElementById("editTaskInput").value.trim();
      const description = document.getElementById("editTaskDescInput").value.trim();
      const assigneeEmail = document.getElementById("editTaskAssigneeInput").value.trim();
      const deadline = document.getElementById("editTaskDeadlineInput").value;

      if (!text) { toast("Task name cannot be empty!", "error"); return; }

      let finalPrio = editSelectedPrio;
      if (deadline) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(deadline + "T00:00:00");
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        if (diffDays <= 7) finalPrio = "High";
        else if (diffDays <= 14) finalPrio = "Med";
        else finalPrio = "Low";
      }

      const board = loadBoard();
      const taskIndex = board[editingTaskCol].findIndex(t => t.id === editingTaskId);
      if (taskIndex !== -1) {
        const oldAssignee = board[editingTaskCol][taskIndex].assigneeEmail;
        const updatedTask = {
          ...board[editingTaskCol][taskIndex],
          text,
          description,
          assigneeEmail,
          deadline,
          priority: finalPrio
        };
        board[editingTaskCol][taskIndex] = updatedTask;
        saveBoard(board);

        // Notify if newly assigned or assignee changed
        if (assigneeEmail && assigneeEmail !== oldAssignee) {
          notifyTaskAssignment(updatedTask);
        }

        const activities = JSON.parse(localStorage.getItem("bf_activity") || "[]");
        activities.unshift(`Edited task "${text}"`);
        localStorage.setItem("bf_activity", JSON.stringify(activities.slice(0, 20)));

        renderBoard();
        toast("Task updated!", "success");
      }
      closeModal();
    };

    /* ===== KEYBOARD SHORTCUTS ===== */
    const SHORTCUTS = [
      { key: "N", desc: "Add task to To Do column" },
      { key: "Ctrl+K", desc: "Focus global search" },
      { key: "?", desc: "Show this help overlay" },
      { key: "Esc", desc: "Close any open modal" },
    ];
    const shortcutLst = document.getElementById("shortcutList");
    SHORTCUTS.forEach(s => {
      shortcutLst.innerHTML += `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);">
      <span style="color:#aaa;font-size:14px;">${s.desc}</span>
      <kbd style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;
           padding:3px 10px;font-size:12px;font-family:monospace;">${s.key}</kbd>
    </div>`;
    });

    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "?" || e.key === "/") {
        e.preventDefault();
        document.getElementById("shortcutModal").classList.remove("hidden");
      }
      if (e.key === "Escape") closeModal();
      if (e.key === "n" || e.key === "N") openAddModal("todo");
    });

    /* ===== LISTEN FOR AI ACTIONS ===== */
    window.addEventListener("refreshKanbanBoard", () => {
      renderBoard();
    });

    /* ===== INIT ===== */
    renderBoard();

    // Check for URL actions (from emails)
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action');
    const taskIdRaw = urlParams.get('taskId');

    if (action && taskIdRaw) {
      const decodedTaskName = decodeURIComponent(taskIdRaw);
      const board = loadBoard();
      const activities = JSON.parse(localStorage.getItem("bf_activity") || "[]");
      let foundAndMoved = false;

      if (action === 'acceptTask') {
        const index = board.todo.findIndex(t => t.text === decodedTaskName);
        if (index !== -1) {
          const task = board.todo.splice(index, 1)[0];
          board.inprog.push(task);
          foundAndMoved = true;
          toast(`Task "${task.text}" accepted and moved to In Progress!`, "success");
          activities.unshift(`Accepted task "${task.text}"`);
        } else {
          toast(`Could not find task "${decodedTaskName}" in To Do.`, "error");
        }
      } else if (action === 'completeTask') {
        // Task can be completed from either To Do or In Progress
        let task = null;
        let pIndex = board.inprog.findIndex(t => t.text === decodedTaskName);
        if (pIndex !== -1) {
          task = board.inprog.splice(pIndex, 1)[0];
        } else {
          let tdIndex = board.todo.findIndex(t => t.text === decodedTaskName);
          if (tdIndex !== -1) {
            task = board.todo.splice(tdIndex, 1)[0];
          }
        }

        if (task) {
          board.done.push(task);
          foundAndMoved = true;
          toast(`Task "${task.text}" marked as Complete!`, "success");
          activities.unshift(`Completed task "${task.text}"`);
        } else {
          toast(`Could not find active task "${decodedTaskName}".`, "error");
        }
      }

      if (foundAndMoved) {
        saveBoard(board);
        renderBoard();
        localStorage.setItem("bf_activity", JSON.stringify(activities.slice(0, 20)));
      }

      // Clean up URL so refresh doesn't trigger it again
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>

  <script type="module" src="authGuard.js"></script>
