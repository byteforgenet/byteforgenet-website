<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Profile | Byteforgenet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="layout.js"></script>
  <style>
    .profile-hero {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding: 28px;
      border-radius: 20px;
      background: rgba(79, 140, 255, 0.05);
      border: 1px solid rgba(79, 140, 255, 0.15);
    }

    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2a2a30;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      overflow: hidden;
      border: 3px solid rgba(79, 140, 255, 0.3);
      flex-shrink: 0;
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info h3 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .profile-info p {
      margin: 0;
      color: #777;
      font-size: 14px;
    }

    .profile-badge {
      display: inline-block;
      margin-top: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #9aa3b2;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: #4f8cff;
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
      outline: none;
    }

    .form-group input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .mini-stat {
      flex: 1;
      min-width: 100px;
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(18, 18, 18, 0.9);
      border: 1px solid rgba(96, 165, 250, 0.15);
      text-align: center;
    }

    .mini-stat strong {
      display: block;
      font-size: 24px;
    }

    .mini-stat span {
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 700px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="auth-bg">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="app-logo">Byteforgenet</h1>
    </div>
    <div class="topbar-right">
      <button id="themeToggle" title="Toggle theme"
        style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px 8px;border-radius:8px;">🌙</button>
      <div class="notif-wrap" id="notifBtn">
        <div class="bell"></div>
        <span class="notif-count" id="notifCount">0</span>
        <div class="notif-menu hidden" id="notifMenu">
          <h4>Notifications</h4>
          <div id="notifList"></div>
        </div>
      </div>
      <div class="profile" id="profileBtn">
        <div class="user-text">
          <span class="username" id="topbarName">—</span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
        <div class="avatar" id="topbarAvatar"><span class="online-dot"></span></div>
        <div class="profile-menu hidden" id="profileMenu">
          <div class="menu-section">
            <button class="menu-item" onclick="location.href='profile.html'">Profile</button>
            <button class="menu-item" onclick="location.href='settings.html'">Settings</button>
          </div>
          <div class="menu-divider"></div>
          <div class="menu-section">
            <button class="menu-item danger" onclick="logout()">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <nav>
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="project.html" class="nav-item">Projects</a>
        <a href="notes.html" class="nav-item">Notes</a>
        <a href="teams.html" class="nav-item">Teams</a>
        <a href="profile.html" class="nav-item active">Profile</a>
        <a href="settings.html" class="nav-item">Settings</a>
      </nav>
    </aside>

    <main class="main-content">

      <!-- HERO -->
      <div class="profile-hero">
        <div class="profile-photo" id="profilePhoto"></div>
        <div class="profile-info">
          <h3 id="heroName">—</h3>
          <p id="heroEmail">—</p>
          <span class="role-badge role-member profile-badge" id="heroBadge">MEMBER</span>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-row">
        <div class="mini-stat">
          <strong id="profileProjects">0</strong>
          <span>Projects</span>
        </div>
        <div class="mini-stat">
          <strong id="profileTasks">0</strong>
          <span>Total Tasks</span>
        </div>
        <div class="mini-stat">
          <strong id="profileDone">0</strong>
          <span>Completed</span>
        </div>
      </div>

      <!-- EDIT PROFILE FORM -->
      <section class="panel">
        <h2 style="margin-top:0;">Edit Profile</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Display Name</label>
            <input id="profileName" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input id="profileEmail" disabled placeholder="your@email.com" />
          </div>
        </div>

        <div class="form-group">
          <label>Account Created</label>
          <input id="profileJoined" disabled />
        </div>

        <button class="primary small" onclick="saveProfile()" style="margin-top:8px;">Save Changes</button>
      </section>

    </main>
  </div>

  <script type="module">
    import { auth } from "./firebase.js";
    import { onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { toast } from "./shared.js";

    // Theme
    const savedTheme = localStorage.getItem("bf_theme") || "dark";
    if (savedTheme === "light") document.documentElement.classList.add("light-mode");
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.textContent = savedTheme === "light" ? "☀️" : "🌙";
    themeBtn.onclick = function () {
      const isLight = document.documentElement.classList.toggle("light-mode");
      localStorage.setItem("bf_theme", isLight ? "light" : "dark");
      this.textContent = isLight ? "☀️" : "🌙";
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) return;

      const name = user.displayName || user.email?.split("@")[0] || "User";
      const email = user.email || "";
      const photo = user.photoURL;
      const role = localStorage.getItem("bf_role") || "member";

      // Topbar
      document.getElementById("topbarName").textContent = name;
      const av = document.getElementById("topbarAvatar");
      if (photo) {
        av.innerHTML = `<img src="${photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /><span class="online-dot"></span>`;
      } else {
        av.innerHTML = `${name.charAt(0).toUpperCase()}<span class="online-dot"></span>`;
      }
      const rb = document.getElementById("roleBadge");
      rb.textContent = role.toUpperCase();
      rb.classList.add(role === "admin" ? "role-admin" : "role-member");

      // Hero
      const photoEl = document.getElementById("profilePhoto");
      if (photo) {
        photoEl.innerHTML = `<img src="${photo}" />`;
      } else {
        photoEl.textContent = name.charAt(0).toUpperCase();
      }
      document.getElementById("heroName").textContent = name;
      document.getElementById("heroEmail").textContent = email;

      const heroBadge = document.getElementById("heroBadge");
      heroBadge.textContent = role.toUpperCase();
      heroBadge.className = "role-badge profile-badge " + (role === "admin" ? "role-admin" : "role-member");

      // Form
      document.getElementById("profileName").value = name;
      document.getElementById("profileEmail").value = email;
      const created = user.metadata?.creationTime
        ? new Date(user.metadata.creationTime).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
        : "Unknown";
      document.getElementById("profileJoined").value = created;

      // Stats
      const tasks = JSON.parse(localStorage.getItem("bf_tasks") || "[]");
      const projects = JSON.parse(localStorage.getItem("bf_projects") || "[]");
      document.getElementById("profileProjects").textContent = projects.length;
      document.getElementById("profileTasks").textContent = tasks.length;
      document.getElementById("profileDone").textContent = tasks.filter(t => t.done).length;

      // Save profile
      window.saveProfile = async function () {
        const newName = document.getElementById("profileName").value.trim();
        if (!newName) { toast("Name cannot be empty.", "error"); return; }
        try {
          await updateProfile(user, { displayName: newName });
          localStorage.setItem("bf_username", newName);
          document.getElementById("heroName").textContent = newName;
          document.getElementById("topbarName").textContent = newName;
          toast("Profile updated!", "success");
        } catch (e) {
          toast("Failed to update profile.", "error");
        }
      };
    });

    // Dropdowns
    const profileBtn = document.getElementById("profileBtn");
    const profileMenu = document.getElementById("profileMenu");
    const notifBtn = document.getElementById("notifBtn");
    const notifMenu = document.getElementById("notifMenu");
    profileBtn.onclick = e => { e.stopPropagation(); profileMenu.classList.toggle("hidden"); notifMenu.classList.add("hidden"); };
    notifBtn.onclick = e => { e.stopPropagation(); notifMenu.classList.toggle("hidden"); profileMenu.classList.add("hidden"); };
    document.onclick = () => { profileMenu.classList.add("hidden"); notifMenu.classList.add("hidden"); };

    const notifications = JSON.parse(localStorage.getItem("bf_notifications") || "[]");
    document.getElementById("notifCount").textContent = notifications.length;
    const nl = document.getElementById("notifList");
    nl.innerHTML = notifications.length
      ? notifications.map(n => `<div class="notif-item">${n.text}</div>`).join("")
      : `<div style="color:#777;font-size:13px;padding:6px 0;">No notifications</div>`;

    import { signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { auth as fbAuth } from "./firebase.js";
    window.logout = function () {
      fbSignOut(fbAuth).then(() => { window.location.href = "login.html"; });
    };
  </script>

  <script type="module" src="authGuard.js"></script>

</body>

</html>
